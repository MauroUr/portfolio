<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark terminal background with subtle rounded corners -->
  <rect width="32" height="32" fill="#080808" rx="4"/>

  <!-- >M_ in neon green, monospace bold -->
  <g font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="22" fill="#00ff41" text-anchor="middle" dominant-baseline="middle">
    <!-- Prompt chevron -->
    <text x="2" y="18">&gt;</text>
    <!-- M -->
    <text x="17" y="18">M</text>
    <!-- Blinking underscore -->
    <text x="32" y="18">_
      <animate attributeName="opacity"
               values="1;1;0;0"
               keyTimes="0;0.5;0.5;1"
               dur="1s"
               repeatCount="indefinite"/>
    </text>
  </g>
</svg>
