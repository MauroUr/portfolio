<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560" font-family="'Courier New', Courier, monospace">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ff41" opacity="0.7"/>
    </marker>
    <marker id="arrow-dim" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2a8a3e" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="560" fill="#080808"/>

  <!-- Scanline texture overlay -->
  <rect width="820" height="560" fill="url(#scanlines)" opacity="0.04"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" fill="#00ff41" font-size="13" font-weight="bold" filter="url(#glow)" letter-spacing="2">// SHADOWBOUND — AI ARCHITECTURE</text>
  <line x1="60" y1="40" x2="760" y2="40" stroke="#2a8a3e" stroke-width="1" opacity="0.6"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LAYER 0: LABEL -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="16" y="72" fill="#2a8a3e" font-size="9" letter-spacing="1">LAYER_0</text>
  <text x="65" y="72" fill="#55cc66" font-size="9">GAME EVENTS BUS   GameEvents&lt;T&gt;</text>

  <!-- Event Bus Bar -->
  <rect x="60" y="78" width="700" height="28" rx="3" fill="none" stroke="#2a8a3e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="410" y="97" text-anchor="middle" fill="#2a8a3e" font-size="10" letter-spacing="3">· · · · · GameEvents&lt;T&gt; — Observer / Event Bus · · · · ·</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LAYER 1: DECISION TREE -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="16" y="134" fill="#2a8a3e" font-size="9" letter-spacing="1">LAYER_1</text>
  <text x="65" y="134" fill="#55cc66" font-size="9">DECISION TREE   (ScriptableObject nodes, evaluated top-down)</text>

  <!-- DT Root Node -->
  <rect x="320" y="140" width="180" height="38" rx="3" fill="rgba(0,255,65,0.07)" stroke="#00ff41" stroke-width="1.5"/>
  <text x="410" y="156" text-anchor="middle" fill="#00ff41" font-size="10" font-weight="bold">DecisionTreeRunner</text>
  <text x="410" y="170" text-anchor="middle" fill="#55cc66" font-size="9">Tick() — evaluates tree root</text>

  <!-- DT Nodes row -->
  <!-- IsPlayerInRange -->
  <rect x="90" y="200" width="148" height="34" rx="3" fill="rgba(0,25,0,0.5)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="164" y="214" text-anchor="middle" fill="#33ff66" font-size="9" font-weight="bold">IsPlayerInRange</text>
  <text x="164" y="226" text-anchor="middle" fill="#55cc66" font-size="8">+ hysteresis threshold</text>

  <!-- IsHealthLow -->
  <rect x="260" y="200" width="130" height="34" rx="3" fill="rgba(0,25,0,0.5)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="325" y="214" text-anchor="middle" fill="#33ff66" font-size="9" font-weight="bold">IsHealthLow</text>
  <text x="325" y="226" text-anchor="middle" fill="#55cc66" font-size="8">threshold trigger</text>

  <!-- WeightedRandom -->
  <rect x="412" y="200" width="148" height="34" rx="3" fill="rgba(0,25,0,0.5)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="486" y="214" text-anchor="middle" fill="#33ff66" font-size="9" font-weight="bold">WeightedRandom</text>
  <text x="486" y="226" text-anchor="middle" fill="#55cc66" font-size="8">distance-proportional roll</text>

  <!-- CanSeePlayer -->
  <rect x="578" y="200" width="148" height="34" rx="3" fill="rgba(0,25,0,0.5)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="652" y="214" text-anchor="middle" fill="#33ff66" font-size="9" font-weight="bold">CanSeePlayer</text>
  <text x="652" y="226" text-anchor="middle" fill="#55cc66" font-size="8">LineOfSight raycast</text>

  <!-- Arrows DT Root → Nodes -->
  <line x1="375" y1="178" x2="206" y2="200" stroke="#2a8a3e" stroke-width="1" marker-end="url(#arrow-dim)"/>
  <line x1="395" y1="178" x2="350" y2="200" stroke="#2a8a3e" stroke-width="1" marker-end="url(#arrow-dim)"/>
  <line x1="425" y1="178" x2="465" y2="200" stroke="#2a8a3e" stroke-width="1" marker-end="url(#arrow-dim)"/>
  <line x1="445" y1="178" x2="622" y2="200" stroke="#2a8a3e" stroke-width="1" marker-end="url(#arrow-dim)"/>

  <!-- Arrow DT → FSM (via reflection dispatch) -->
  <line x1="410" y1="234" x2="410" y2="258" stroke="#00ff41" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <text x="415" y="251" fill="#2a8a3e" font-size="8">reflection dispatch</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LAYER 2: FSM -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="16" y="272" fill="#2a8a3e" font-size="9" letter-spacing="1">LAYER_2</text>
  <text x="65" y="272" fill="#55cc66" font-size="9">FINITE STATE MACHINE   (7 states, resolved via reflection)</text>

  <!-- FSM states row -->
  <!-- Idle -->
  <rect x="62" y="278" width="72" height="28" rx="3" fill="rgba(0,20,0,0.6)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="98" y="296" text-anchor="middle" fill="#33ff66" font-size="9">Idle</text>

  <!-- Measure -->
  <rect x="142" y="278" width="72" height="28" rx="3" fill="rgba(0,20,0,0.6)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="178" y="296" text-anchor="middle" fill="#33ff66" font-size="9">Measure</text>

  <!-- Pursue -->
  <rect x="222" y="278" width="72" height="28" rx="3" fill="rgba(0,20,0,0.6)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="258" y="296" text-anchor="middle" fill="#33ff66" font-size="9">Pursue</text>

  <!-- Attack — highlighted -->
  <rect x="302" y="274" width="80" height="36" rx="3" fill="rgba(0,255,65,0.1)" stroke="#00ff41" stroke-width="1.5"/>
  <text x="342" y="296" text-anchor="middle" fill="#00ff41" font-size="10" font-weight="bold">Attack</text>

  <!-- Block -->
  <rect x="390" y="278" width="72" height="28" rx="3" fill="rgba(0,20,0,0.6)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="426" y="296" text-anchor="middle" fill="#33ff66" font-size="9">Block</text>

  <!-- Evade -->
  <rect x="470" y="278" width="72" height="28" rx="3" fill="rgba(0,20,0,0.6)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="506" y="296" text-anchor="middle" fill="#33ff66" font-size="9">Evade</text>

  <!-- Heal -->
  <rect x="550" y="278" width="72" height="28" rx="3" fill="rgba(0,20,0,0.6)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="586" y="296" text-anchor="middle" fill="#33ff66" font-size="9">Heal</text>

  <!-- FSM state transition arrows (curved, showing some transitions) -->
  <path d="M 258,306 Q 258,320 302,310" stroke="#2a8a3e" stroke-width="1" fill="none" marker-end="url(#arrow-dim)"/>
  <path d="M 390,306 Q 390,320 342,310" stroke="#2a8a3e" stroke-width="1" fill="none" marker-end="url(#arrow-dim)"/>
  <path d="M 98,306 Q 98,330 178,306" stroke="#2a8a3e" stroke-width="1" fill="none" stroke-dasharray="2,2" marker-end="url(#arrow-dim)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LAYER 3: STEERING + FLOCKING -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="16" y="344" fill="#2a8a3e" font-size="9" letter-spacing="1">LAYER_3</text>
  <text x="65" y="344" fill="#55cc66" font-size="9">MOVEMENT   Steering Behaviors + Craig Reynolds Flocking</text>

  <!-- Steering box -->
  <rect x="62" y="350" width="300" height="80" rx="3" fill="rgba(0,15,0,0.5)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="212" y="366" text-anchor="middle" fill="#33ff66" font-size="10" font-weight="bold">STEERING BEHAVIORS</text>
  <text x="90" y="382" fill="#55cc66" font-size="9">▸ Seek</text>
  <text x="90" y="394" fill="#55cc66" font-size="9">▸ Pursuit (predicted intercept)</text>
  <text x="90" y="406" fill="#55cc66" font-size="9">▸ Evade</text>
  <text x="90" y="418" fill="#55cc66" font-size="9">▸ ObstacleAvoidance</text>

  <!-- Flocking box -->
  <rect x="378" y="350" width="368" height="80" rx="3" fill="rgba(0,15,0,0.5)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="562" y="366" text-anchor="middle" fill="#33ff66" font-size="10" font-weight="bold">FLOCKING SYSTEM   (Craig Reynolds)</text>
  <text x="396" y="382" fill="#55cc66" font-size="9">▸ Separation / Cohesion / Alignment</text>
  <text x="396" y="394" fill="#55cc66" font-size="9">▸ MeleeEncircle — deterministic slot assignment</text>
  <text x="396" y="406" fill="#55cc66" font-size="9">▸ RangedSpread — 8-direction scoring</text>
  <text x="396" y="418" fill="#55cc66" font-size="9">▸ Neighbor cache (0.15s TTL, NonAlloc query)</text>

  <!-- Arrows FSM → Steering / Flocking -->
  <line x1="258" y1="306" x2="200" y2="350" stroke="#00ff41" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="342" y1="310" x2="450" y2="350" stroke="#00ff41" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LAYER 4: ENEMY TYPES -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="16" y="455" fill="#2a8a3e" font-size="9" letter-spacing="1">LAYER_4</text>
  <text x="65" y="455" fill="#55cc66" font-size="9">ENEMY TYPES   (Abstract Factory + Object Pool — zero alloc on spawn)</text>

  <rect x="62" y="462" width="164" height="30" rx="3" fill="rgba(0,15,0,0.5)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="144" y="481" text-anchor="middle" fill="#33ff66" font-size="9">Melee — MeleeEncircle</text>

  <rect x="238" y="462" width="164" height="30" rx="3" fill="rgba(0,15,0,0.5)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="320" y="481" text-anchor="middle" fill="#33ff66" font-size="9">Ranged — RangedSpread</text>

  <rect x="414" y="462" width="164" height="30" rx="3" fill="rgba(0,15,0,0.5)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="496" y="481" text-anchor="middle" fill="#33ff66" font-size="9">Boss — Custom DT tree</text>

  <rect x="590" y="462" width="150" height="30" rx="3" fill="rgba(0,15,0,0.5)" stroke="#2a8a3e" stroke-width="1"/>
  <text x="665" y="481" text-anchor="middle" fill="#33ff66" font-size="9">Pool — LinkedList&lt;T&gt;</text>

  <!-- Arrows Steering/Flocking → Enemies -->
  <line x1="212" y1="430" x2="144" y2="462" stroke="#2a8a3e" stroke-width="1" marker-end="url(#arrow-dim)"/>
  <line x1="562" y1="430" x2="496" y2="462" stroke="#2a8a3e" stroke-width="1" marker-end="url(#arrow-dim)"/>
  <line x1="562" y1="430" x2="665" y2="462" stroke="#2a8a3e" stroke-width="1" marker-end="url(#arrow-dim)"/>

  <!-- Event Bus connections (dashed verticals from top bar) -->
  <line x1="144" y1="106" x2="144" y2="278" stroke="#1a5530" stroke-width="1" stroke-dasharray="3,4" opacity="0.5"/>
  <line x1="342" y1="106" x2="342" y2="274" stroke="#00ff41" stroke-width="1" stroke-dasharray="3,4" opacity="0.3"/>
  <line x1="665" y1="106" x2="665" y2="278" stroke="#1a5530" stroke-width="1" stroke-dasharray="3,4" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════════ -->
  <line x1="60" y1="508" x2="760" y2="508" stroke="#2a8a3e" stroke-width="1" opacity="0.4"/>
  <text x="65" y="524" fill="#2a8a3e" font-size="8">——  data flow</text>
  <text x="150" y="524" fill="#2a8a3e" font-size="8">- - -  event dispatch</text>
  <text x="260" y="524" fill="#00ff41" font-size="8" font-weight="bold">——  primary flow</text>
  <text x="355" y="524" fill="#2a8a3e" font-size="8">│  event bus tap</text>

  <text x="500" y="518" fill="#2a8a3e" font-size="8">Patterns:</text>
  <text x="545" y="518" fill="#55cc66" font-size="8">State, Strategy, Observer, Command,</text>
  <text x="500" y="530" fill="#55cc66" font-size="8">Service Locator, Template Method, Data-Driven, Abstract Factory, Object Pool</text>
</svg>
